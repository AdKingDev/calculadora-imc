<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Calculadora de IMC</title>

    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/media-query.css">

    <link rel="shortcut icon" href="assets/images/favicon.png" type="image/x-icon">
</head>
<body>
    <!-- Conteúdo principal -->
    <main class="container">
        <h1 class="titulo">Calculadora: IMC</h1>

        <!-- Campo para Nome -->
        <div class="input">
            <input type="text" id="nome" placeholder="Digite seu nome">
        </div>

        <!-- Campo para Peso -->
        <div class="input">
            <input type="number" id="peso" placeholder="Digite seu peso em kg">
        </div>

        <!-- Campo para Altura -->
        <div class="input">
            <input type="number" id="altura" placeholder="Digite sua altura em metros">
        </div>

        <!-- Botão para Calcular -->
        <button id="calcular">Calcular</button>

        <!-- Área para o resultado -->
        <div class="result" id="resultado"></div>
        
        <!-- Créditos -->
        <footer>
            <p><small>Desenvolvido por <a href="https://adking.dev" target="_blank">@adking.dev</a> &copy; 25/11/2025</small></p>
        </footer>
    </main>
    <script src="assets/javascript/script.js"></script>
</body>
</html>
